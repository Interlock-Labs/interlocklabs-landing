<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interlock</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0a'/><rect x='5' y='5' width='9' height='9' rx='1' fill='%23f8f6f2'/><rect x='18' y='5' width='9' height='9' rx='1' fill='none' stroke='%23f8f6f2' stroke-width='1.5'/><rect x='5' y='18' width='9' height='9' rx='1' fill='none' stroke='%23f8f6f2' stroke-width='1.5'/><rect x='18' y='18' width='9' height='9' rx='1' fill='%23f8f6f2'/></svg>" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #0a0a0a;
      --paper: #f8f6f2;
      --accent: #1a5c3a;
      --muted: #6b6b6b;
      --muted-2: #9a9a9a;
      --muted-3: #bbb;
      --border: #e2dfda;
      --border-dark: #d0cdc6;
      --danger: #8b2635;
      --safe: #1a5c3a;
      --clinical: #8b2635;
      --behavioral: #6b4c9a;
      --cultural: #b8860b;
      --bg: #f3f1ec;
      --surface: #ffffff;
      --surface-2: #faf9f7;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Instrument Serif', serif;
      --sans: 'DM Sans', sans-serif;
      --fs-xs: 0.6875rem;
      --fs-sm: 0.75rem;
      --fs-base: 0.875rem;
      --fs-lg: 1.125rem;
      --fs-xl: 1.5rem;
      --radius: 6px;
      --radius-sm: 4px;
    }
    body {
      font-family: var(--sans); background: var(--bg);
      color: var(--ink); font-size: var(--fs-base);
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02; pointer-events: none; z-index: 9999;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
    @keyframes spin { to { transform:rotate(360deg) } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .fade-in { animation: fadeIn .25s ease-out both }
    .slide-up { animation: slideUp .3s ease-out both }

    /* ─── Chrome ─── */
    .chrome {
      background: var(--ink); color: var(--paper);
      height: 40px; display: flex; align-items: center;
      padding: 0 1.25rem; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      font-family: var(--mono); font-size: var(--fs-xs);
    }
    .chrome-logo { display:flex; align-items:center; gap:.6rem; font-weight:600; font-size:var(--fs-sm); letter-spacing:-.02em; }
    .chrome-mark { width:20px; height:20px; border:1.5px solid var(--paper); border-radius:3px; display:grid; grid-template:1fr 1fr/1fr 1fr; gap:1.5px; padding:3px; }
    .chrome-mark i { border-radius:1px; }
    .chrome-mark i:nth-child(1),.chrome-mark i:nth-child(4) { background:var(--paper); }
    .chrome-mark i:nth-child(2),.chrome-mark i:nth-child(3) { border:1px solid rgba(248,246,242,.5); }
    .chrome-right { display:flex; align-items:center; gap:1.25rem; color:rgba(248,246,242,.45); }
    .chrome-dot { width:5px; height:5px; border-radius:50%; display:inline-block; margin-right:.3rem; }
    .chrome-dot-g { background:#4ade80; }
    .chrome-dot-y { background:#fbbf24; animation:blink 1.5s infinite; }

    /* ─── Utility ─── */
    .label { font-family:var(--mono); font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    .tag { display:inline-flex; align-items:center; padding:.1rem .4rem; border-radius:3px; font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.02em; line-height:1.5; }
    .tag-block { background:rgba(139,38,53,.08); color:var(--danger); border:1px solid rgba(139,38,53,.15); }
    .tag-pass { background:rgba(26,92,58,.08); color:var(--safe); border:1px solid rgba(26,92,58,.15); }
    .tag-critical { background:var(--danger); color:white; }
    .tag-high { background:#d97706; color:white; }
    .tag-flag { background:rgba(139,38,53,.06); color:var(--danger); border:1px solid rgba(139,38,53,.1); }
    .tag-l1 { background:rgba(26,92,58,.06); color:var(--safe); border:1px solid rgba(26,92,58,.12); }
    .tag-l2 { background:rgba(107,76,154,.06); color:var(--behavioral); border:1px solid rgba(107,76,154,.12); }
    .btn { display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .9rem; font-family:var(--mono); font-size:var(--fs-xs); font-weight:500; border-radius:var(--radius-sm); border:none; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .btn-primary { background:var(--ink); color:var(--paper); }
    .btn-primary:hover { background:var(--accent); }
    .btn-primary:disabled { background:var(--border); color:var(--muted); cursor:default; }
    .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--ink); color:var(--ink); }
    .spinner { width:12px; height:12px; border:1.5px solid var(--cultural); border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }

    /* ─── Shell ─── */
    .shell { max-width:1280px; margin:0 auto; padding:0 1.5rem; }

    /* ─── Persistent info bar (arch) ─── */
    .info-bar {
      display:flex; align-items:center; justify-content:space-between;
      gap:1rem; flex-wrap:wrap;
      margin-top:.75rem; padding:.45rem 1rem;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      font-family:var(--mono); font-size:10px; color:var(--muted);
    }
    .info-item { display:flex; align-items:center; gap:.4rem; }
    .info-item strong { color:var(--ink); font-weight:600; }
    .info-dot { width:6px; height:6px; border-radius:2px; flex-shrink:0; }

    /* ─── Journey Bar ─── */
    .journey {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); margin-top:.75rem;
      padding:.5rem .75rem; display:flex; align-items:center; gap:0;
    }
    .j-step {
      flex:1; text-align:center; padding:.3rem .15rem;
      font-size:10px; color:var(--muted-3); font-family:var(--mono);
      line-height:1.3; transition:all .3s; display:flex; flex-direction:column; align-items:center; gap:.1rem;
    }
    .j-step.active { color:var(--ink); font-weight:600; }
    .j-step.done { color:var(--safe); }
    .j-step.warn { color:var(--danger); }
    .j-icon {
      width:22px; height:22px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      border:1.5px solid var(--border); color:var(--muted-3);
      font-size:10px; font-weight:600; transition:all .3s;
      background:var(--surface);
    }
    .j-step.active .j-icon { border-color:var(--ink); color:var(--ink); background:var(--surface-2); }
    .j-step.done .j-icon { border-color:var(--safe); color:white; background:var(--safe); }
    .j-step.warn .j-icon { border-color:var(--danger); color:white; background:var(--danger); }
    .j-arrow { color:var(--border-dark); font-size:8px; flex-shrink:0; padding:0 1px; margin-top:-2px; }

    /* ─── Main Grid ─── */
    .grid { display:grid; grid-template-columns:1fr 360px; gap:1rem; margin-top:.75rem; align-items:start; }

    /* ─── Report Card ─── */
    .rpt-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .rpt-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); }
    .rpt-tab {
      flex:1; padding:.5rem .5rem; text-align:center; cursor:pointer;
      font-size:var(--fs-xs); font-family:var(--mono); color:var(--muted);
      border-bottom:2px solid transparent; transition:all .15s;
      background:var(--surface-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .rpt-tab:hover { color:var(--ink); background:var(--surface); }
    .rpt-tab.active { color:var(--ink); font-weight:600; border-bottom-color:var(--ink); background:var(--surface); }
    .rpt-head {
      padding:.55rem .85rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:.25rem;
    }
    .rpt-table { width:100%; border-collapse:collapse; font-size:var(--fs-sm); }
    .rpt-table th {
      text-align:left; font-family:var(--mono); font-size:10px;
      text-transform:uppercase; letter-spacing:.08em; color:var(--muted-2);
      padding:.3rem .75rem; border-bottom:1px solid var(--border);
      background:var(--surface-2); font-weight:500;
    }
    .rpt-table td { padding:.3rem .75rem; border-bottom:1px solid rgba(0,0,0,.03); }
    .rpt-table tr:last-child td { border-bottom:none; }
    .rpt-table tr:hover td { background:var(--surface-2); }
    .rpt-val-flag { color:var(--danger); font-weight:600; }
    .rpt-ref { font-family:var(--mono); font-size:11px; color:var(--muted-2); }

    /* ─── Summary section (L1 inside report card) ─── */
    .summary-section {
      border-top:1px solid var(--border); padding:.6rem .75rem;
      background:var(--surface-2);
    }
    .summary-header {
      display:flex; align-items:center; gap:.4rem; margin-bottom:.4rem;
    }
    .summary-header .label { margin:0; }
    .summary-ai {
      padding:.55rem .75rem; border-radius:var(--radius-sm);
      font-size:var(--fs-sm); line-height:1.65;
      background:var(--surface); border:1px solid var(--border);
    }
    .summary-ai.blocked {
      border-color:rgba(139,38,53,.2);
      border-left:3px solid var(--danger);
      background:rgba(139,38,53,.02);
      opacity:.55;
    }
    .summary-ai.safe {
      border-color:rgba(26,92,58,.18);
      background:rgba(26,92,58,.03);
    }
    .summary-verdict {
      margin-top:.5rem; padding:.5rem .65rem;
      border-radius:var(--radius-sm);
      border:1px solid var(--border);
    }
    .summary-verdict.is-block {
      border-color:rgba(139,38,53,.2);
      background:rgba(139,38,53,.015);
    }
    .summary-corrected {
      margin-top:.4rem;
    }
    .summary-corrected-label {
      font-family:var(--mono); font-size:10px;
      color:var(--safe); font-weight:600;
      text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:.15rem; display:flex; align-items:center; gap:.3rem;
    }

    /* ─── Phase divider ─── */
    .phase-divider {
      margin:.75rem 0; padding:.55rem .75rem;
      display:flex; align-items:center; gap:.6rem;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:var(--surface);
    }
    .phase-divider-icon {
      width:28px; height:28px; border-radius:50%;
      background:rgba(107,76,154,.08); border:1px solid rgba(107,76,154,.15);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; flex-shrink:0;
    }
    .phase-divider-text {
      font-size:var(--fs-sm); line-height:1.4;
    }
    .phase-divider-text strong {
      font-family:var(--mono); font-size:11px;
      display:block; color:var(--ink);
    }
    .phase-divider-text span {
      font-size:var(--fs-xs); color:var(--muted);
    }

    /* ─── Conversation (L2) ─── */
    .convo-section { margin-top:.5rem; }
    .convo-section-head {
      display:flex; align-items:center; gap:.5rem;
      margin-bottom:.4rem; padding:.3rem 0;
      border-bottom:1px solid var(--border);
    }
    .convo-turn { margin-bottom:.5rem; }
    .convo-patient {
      padding:.5rem .7rem; border-radius:var(--radius);
      border-radius:12px 12px 4px 12px;
      background:rgba(107,76,154,.04); border:1px solid rgba(107,76,154,.12);
      font-style:italic; font-size:var(--fs-sm); line-height:1.6;
      margin-bottom:.35rem; max-width:85%;
      margin-left:auto;
    }
    .convo-patient-label {
      font-family:var(--mono); font-size:10px; color:var(--behavioral);
      text-align:right; margin-bottom:.15rem; padding-right:.2rem;
    }

    /* ─── Event sections (legacy, keep for compatibility) ─── */
    .evt-section { margin-top:.75rem; }
    .evt-section-head {
      display:flex; align-items:center; gap:.5rem;
      margin-bottom:.4rem; padding:.3rem 0;
      border-bottom:1px solid var(--border);
    }

    /* ─── Verification blocks ─── */
    .vrf-block { border:1px solid var(--border); border-radius:var(--radius); margin-bottom:.5rem; overflow:hidden; }
    .vrf-block.is-block { border-color:rgba(139,38,53,.2); }
    .vrf-block.is-block .vrf-head { background:rgba(139,38,53,.02); }
    .vrf-block.is-pass { border-color:rgba(26,92,58,.2); }
    .vrf-block.is-pass .vrf-head { background:rgba(26,92,58,.02); }
    .vrf-block.is-override { border-color:rgba(184,134,11,.25); }
    .vrf-block.is-override .vrf-head { background:rgba(184,134,11,.02); }
    .override-box {
      margin-top:.35rem; padding:.45rem .65rem; border-radius:var(--radius-sm);
      background:rgba(26,92,58,.03); border:1px solid rgba(26,92,58,.15);
      border-left:3px solid var(--safe);
    }
    .override-text {
      font-size:var(--fs-sm); line-height:1.55; color:var(--ink); margin-top:.15rem;
    }
    .vrf-head {
      padding:.45rem .7rem; display:flex; align-items:center; gap:.4rem;
      font-size:var(--fs-sm); cursor:pointer; transition:background .1s;
    }
    .vrf-head:hover { background:var(--surface-2); }
    .vrf-time { font-family:var(--mono); font-size:10px; color:var(--muted-2); min-width:48px; flex-shrink:0; }
    .vrf-title { flex:1; font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .vrf-lat { font-family:var(--mono); font-size:10px; color:var(--muted-3); flex-shrink:0; }
    .vrf-arrow { font-size:9px; color:var(--muted-3); transition:transform .2s; flex-shrink:0; width:12px; text-align:center; }
    .vrf-arrow.open { transform:rotate(90deg); }
    .vrf-detail { padding:.5rem .7rem .7rem; border-top:1px solid var(--border); }

    /* ─── AI text ─── */
    .ai-wrap { margin:.35rem 0; }
    .ai-lbl { font-family:var(--mono); font-size:10px; color:var(--muted-2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.15rem; display:flex; align-items:center; gap:.3rem; }
    .ai-body {
      padding:.5rem .7rem; border-radius:var(--radius-sm);
      font-size:var(--fs-sm); line-height:1.65;
      background:var(--surface-2); border:1px solid var(--border);
    }
    /* Fix #13: Blocked text — no strikethrough on paragraphs, use opacity + red left border */
    .ai-body.blocked {
      border-color:rgba(139,38,53,.2);
      border-left:3px solid var(--danger);
      background:rgba(139,38,53,.02);
      opacity:.6;
    }
    .ai-body.safe { border-color:rgba(26,92,58,.18); background:rgba(26,92,58,.03); }
    .ai-body.patient { border-left:3px solid var(--behavioral); background:rgba(107,76,154,.02); font-style:italic; }

    /* ─── Lenses ─── */
    .lens-list { margin:.35rem 0; }
    .lens-row { display:flex; align-items:flex-start; gap:.4rem; padding:.25rem .45rem; border-radius:var(--radius-sm); margin-bottom:.1rem; font-size:var(--fs-sm); line-height:1.5; }
    .lens-row.fail { background:rgba(139,38,53,.025); }
    .lens-row.pass { background:rgba(26,92,58,.015); }
    .lens-dot { width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:white; flex-shrink:0; margin-top:2px; }
    .lens-dot.pass { background:var(--safe); }
    .lens-dot.fail { background:var(--danger); }
    .lens-name { font-family:var(--mono); font-size:11px; font-weight:600; min-width:64px; flex-shrink:0; }
    .lens-msg { color:var(--muted); }
    .lens-msg.fail { color:var(--danger); }
    .rule-row { display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.4rem; font-family:var(--mono); font-size:10px; }
    .rule-chip { padding:.15rem .5rem; border-radius:3px; background:var(--surface-2); border:1px solid var(--border); }
    .rule-chip code { color:var(--danger); font-weight:600; }
    .rule-chip .s { color:var(--accent); }
    .rule-chip-primary { padding:.2rem .55rem; border-radius:3px; background:rgba(10,10,10,.04); border:1.5px solid var(--ink); font-weight:600; color:var(--ink); }
    .rule-chip-primary code { color:var(--ink); }
    .insight { margin-top:.4rem; padding:.45rem .65rem; border-radius:var(--radius-sm); background:rgba(107,76,154,.035); border:1px solid rgba(107,76,154,.12); font-family:var(--serif); font-size:var(--fs-base); font-style:italic; color:var(--behavioral); line-height:1.55; }

    /* ─── Processing ─── */
    .processing-bar {
      padding:.45rem .7rem; display:flex; align-items:center; gap:.5rem;
      font-family:var(--mono); font-size:var(--fs-xs); color:var(--cultural);
      border:1px solid rgba(184,134,11,.15); border-radius:var(--radius);
      background:linear-gradient(90deg,rgba(184,134,11,.02) 25%,rgba(184,134,11,.06) 50%,rgba(184,134,11,.02) 75%);
      background-size:200% 100%; animation:shimmer 2s infinite linear;
      margin-bottom:.5rem;
    }

    /* ─── Empty hint ─── */
    .empty-hint {
      padding:1.5rem 1rem; text-align:center;
      color:var(--muted-3); font-size:var(--fs-sm);
      border:1px dashed var(--border); border-radius:var(--radius);
      margin-top:.75rem;
    }

    /* ─── Action bar ─── */
    .action-bar {
      padding:.5rem .75rem; border-top:1px solid var(--border);
      display:flex; align-items:center; gap:.5rem;
      background:var(--surface);
      position:sticky; bottom:0; z-index:5;
    }

    /* ─── Audit Panel ─── */
    .audit-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
      position:sticky; top:48px; min-height:320px;
      display:flex; flex-direction:column;
    }
    .audit-head {
      padding:.5rem .7rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface-2);
    }
    .audit-stats { display:grid; grid-template-columns:1fr 1fr 1fr; border-bottom:1px solid var(--border); }
    .audit-stat { text-align:center; padding:.5rem .3rem; border-right:1px solid var(--border); }
    .audit-stat:last-child { border-right:none; }
    .audit-stat-num { font-family:var(--serif); font-size:var(--fs-xl); line-height:1; }
    .audit-stat-label { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-2); margin-top:.05rem; }
    .audit-list { flex:1; overflow-y:auto; max-height:360px; }
    .audit-group-head {
      padding:.35rem .7rem; font-family:var(--mono); font-size:9px;
      text-transform:uppercase; letter-spacing:.08em;
      color:var(--muted-3); background:var(--surface-2);
      border-bottom:2px solid var(--border);
    }
    .audit-row {
      padding:.5rem .7rem; border-bottom:1px solid rgba(0,0,0,.06);
      display:grid; grid-template-columns:1fr auto;
      gap:.2rem .5rem; align-items:start; font-size:var(--fs-sm);
      min-width:0;
    }
    .audit-row:hover { background:var(--surface-2); }
    .audit-row.is-block { border-left:3px solid var(--danger); background:rgba(139,38,53,.015); }
    .audit-row.is-pass { border-left:3px solid var(--safe); background:rgba(26,92,58,.015); }
    .audit-v.override { color:var(--cultural); background:rgba(184,134,11,.08); border:1px solid rgba(184,134,11,.2); }
    .audit-content { min-width:0; overflow:hidden; }
    .audit-desc { line-height:1.4; color:var(--ink); }
    .audit-desc.is-pass { color:var(--muted); }
    .audit-meta { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:.1rem; display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
    .audit-v { font-family:var(--mono); font-size:10px; font-weight:600; padding:.2rem .5rem; border-radius:3px; white-space:nowrap; text-align:center; letter-spacing:.03em; flex-shrink:0; }

      font-family:var(--mono); font-size:10px; color:var(--accent);

      transition:all .15s; padding:.15rem 0;
    }
    .audit-see-details:hover { color:var(--ink); text-decoration:underline; }
    .audit-detail {
      grid-column:1 / -1;
      padding:.4rem 0 .1rem;
      border-top:1px solid rgba(0,0,0,.05);
      margin-top:.3rem;
      animation: fadeIn .2s ease-out;
    }
    .audit-detail-label {
      font-family:var(--mono); font-size:9px; font-weight:600;
      text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:.15rem;
    }
    .audit-detail-label.blocked { color:var(--danger); }
    .audit-detail-label.replaced { color:var(--safe); }
    .audit-detail-text {
      font-size:var(--fs-xs); line-height:1.55; padding:.35rem .5rem;
      border-radius:var(--radius-sm); margin-bottom:.35rem;
      max-height:120px; overflow-y:auto;
    }
    .audit-detail-text.blocked {
      background:rgba(139,38,53,.02); border:1px solid rgba(139,38,53,.12);
      border-left:2px solid var(--danger); color:var(--muted);

    .audit-detail-text.replaced {
      background:rgba(26,92,58,.02); border:1px solid rgba(26,92,58,.12);

    }
    .audit-footer {
      padding:.5rem .7rem; border-top:1px solid var(--border);
      font-family:var(--mono); font-size:10px;
      color:var(--muted); line-height:1.7; margin-top:auto;
    }
    /* Ghost skeleton for empty audit */
    .audit-ghost {
      padding:.7rem; display:flex; flex-direction:column; gap:.5rem; flex:1;
      align-items:center; justify-content:center;
    }
    .audit-ghost-row {
      width:100%; display:grid; grid-template-columns:1fr auto;
      gap:.35rem; padding:.3rem .7rem;
    }
    .ghost-bar { background:var(--border); border-radius:2px; height:10px; opacity:.3; }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ─── Tablet ─── */
    @media (max-width:960px) {
      .grid { grid-template-columns:1fr; }
      .audit-panel { position:static; min-height:auto; max-height:none; }
      .audit-list { max-height:300px; }
      .info-bar { font-size:9px; gap:.5rem; }
    }

    /* ─── Mobile ─── */
    @media (max-width:640px) {
      .shell { padding:0 .6rem; }
      .chrome { padding:0 .6rem; }
      .chrome-right span:last-child { display:none; } /* hide version */

      /* Info bar: 2x2 grid */
      .info-bar {
        display:grid; grid-template-columns:1fr 1fr;
        gap:.3rem .5rem; padding:.35rem .55rem; font-size:9px;
      }

      /* Journey: scroll horizontally, don't squeeze */
      .journey {
        overflow-x:auto; -webkit-overflow-scrolling:touch;
        padding:.35rem .4rem; scrollbar-width:none;
      }
      .journey::-webkit-scrollbar { display:none; }
      .j-step { flex:0 0 auto; min-width:52px; padding:.15rem .1rem; font-size:9px; }
      .j-icon { width:18px; height:18px; font-size:9px; }
      .j-arrow { font-size:7px; }

      /* Report tabs: scroll, not squeeze */
      .rpt-tabs { overflow-x:auto; scrollbar-width:none; }
      .rpt-tabs::-webkit-scrollbar { display:none; }
      .rpt-tab { flex:0 0 auto; padding:.35rem .55rem; font-size:10px; }

      /* Report header: stack */
      .rpt-head { flex-direction:column; align-items:flex-start; padding:.4rem .55rem; gap:.15rem; }

      /* Report table: force min-width so it scrolls */
      .rpt-table { min-width:440px; }
      .rpt-table th, .rpt-table td { padding:.2rem .45rem; font-size:11px; }

      /* Action bar */
      .action-bar { padding:.35rem .55rem; flex-wrap:wrap; }

      /* Verification blocks */
      .vrf-head { padding:.3rem .5rem; gap:.25rem; flex-wrap:wrap; }
      .vrf-time { min-width:auto; }
      .vrf-title { font-size:11px; }
      .vrf-lat { display:none; }
      .vrf-detail { padding:.35rem .5rem .5rem; }

      /* AI text — keep readable, don't go below 12px */
      .ai-body { padding:.35rem .5rem; font-size:12px; line-height:1.55; }

      /* Lenses */
      .lens-row { gap:.3rem; padding:.2rem .3rem; font-size:11px; }
      .lens-name { min-width:auto; font-size:10px; }
      .lens-msg { font-size:11px; }

      /* Insight */
      .insight { font-size:12px; padding:.35rem .5rem; }

      /* Processing */
      .processing-bar { font-size:10px; padding:.3rem .5rem; }

      /* Audit panel */
      .audit-panel { position:static; min-height:auto; }
      .audit-stat { padding:.35rem .2rem; }
      .audit-stat-num { font-size:1.2rem; }
      .audit-list { max-height:250px; }
      .audit-row { grid-template-columns:1fr auto; padding:.35rem .5rem; font-size:11px; }
      .audit-group-head { padding:.2rem .5rem; font-size:8px; }
      .audit-footer { padding:.35rem .5rem; font-size:9px; }

      .grid { gap:.6rem; margin-top:.4rem; }
      .evt-section { margin-top:.5rem; }
      .empty-hint { padding:.8rem .6rem; font-size:11px; }

      /* Summary section */

      /* Phase divider */
      .phase-divider { padding:.4rem .55rem; margin:.5rem 0; }

      /* Conversation */
      .convo-patient { padding:.4rem .55rem; font-size:12px; max-width:90%; }

    /* ─── Small phones ─── */

      .j-step { min-width:46px; font-size:8px; }

/* Fix #15: Word-boundary truncation */
const truncate = (s, max) => {
  if (!s || s.length <= max) return s;
  const cut = s.lastIndexOf(' ', max);
  return s.substring(0, cut > 0 ? cut : max) + '…';

/* ═══ LENS ROW ═══ */
function LensRow({ lens }) {
  const names = { clinical:'Clinical', behavioral:'Behavioral', cultural:'Cultural' };
  return (
    <div className={`lens-row ${lens.pass ? 'pass' : 'fail'}`}>
      <div className={`lens-dot ${lens.pass ? 'pass' : 'fail'}`}>{lens.pass ? '✓' : '✗'}</div>
      <div className="lens-name" style={{color:`var(--${lens.id})`}}>{names[lens.id]}</div>
      <div className={`lens-msg ${lens.pass ? '' : 'fail'}`}>{lens.msg}</div>
    </div>
  );
}

/* ═══ AUDIT ROW ═══ */
function AuditRow({ item, isPass, demoComplete }) {
  const [expanded, setExpanded] = useState(false);
  const hasDetail = !isPass && item.original && item.replacement;
  const canExpand = hasDetail && demoComplete;

  return (
    <div className={`audit-row ${isPass ? 'is-pass' : 'is-block'} fade-in`}>
      <div className="audit-content">
        <div className={`audit-desc ${isPass ? 'is-pass' : ''}`}>
          {isPass
            ? (item.desc.includes('override')
              ? item.desc
              : item.layer === 'L1' ? 'Summary verified safe' : 'Response verified safe')
            : item.desc}
        </div>
        <div className="audit-meta">
          <span>{item.time}</span>
          <span>·</span>
          <span>{item.layer}</span>
          {!isPass && item.rule && item.rule !== '—' && <><span>·</span><span>{item.rule}</span></>}
        </div>
        {canExpand && !expanded && (
          <div className="audit-see-details" onClick={(e) => { e.stopPropagation(); setExpanded(true); }}>
            See details ›
          </div>
        )}
        {canExpand && expanded && (
          <div className="audit-see-details" onClick={(e) => { e.stopPropagation(); setExpanded(false); }}>
            Hide details
          </div>
        )}
      </div>
      <span className={`audit-v ${isPass ? (item.desc.includes('override') ? 'override' : 'pass') : item.verdict}`}>
        {isPass ? (item.desc.includes('override') ? 'OVERRIDE' : 'PASS') : 'BLOCK'}
      </span>
      {expanded && canExpand && (
        <div className="audit-detail">
          <div className="audit-detail-label blocked">Blocked output</div>
          <div className="audit-detail-text blocked">{item.original}</div>
          <div className="audit-detail-label replaced">Delivered to patient</div>
          <div className="audit-detail-text replaced">{item.replacement}</div>
        </div>
      )}
    </div>
  );
}

/* ═══ VERIFICATION BLOCK ═══ */
function VBlock({ evt, isLast }) {
  /* Fix #7: Auto-expand last event, not first N */
  const [open, setOpen] = useState(isLast);
  const isBlock = evt.verdict === 'BLOCK';

  if (evt.type === 'patient') {
    return (
      <div className="ai-wrap slide-up">
        <div className="ai-lbl"><span className="tag tag-l2">L2</span> Patient query</div>
        <div className="ai-body patient">{evt.text}</div>
      </div>
    );
  }

  return (
    <div className={`vrf-block ${isBlock ? 'is-block' : evt.flagOverride ? 'is-override' : 'is-pass'} slide-up`}>
      <div className="vrf-head" onClick={() => setOpen(!open)}>
        <span className="vrf-time">{evt._time}</span>
        {evt.flagOverride ? (
          <>
            <span className="tag tag-flag">FLAG</span>
            <span className="tag tag-pass" style={{marginLeft:2}}>OVERRIDE → PASS</span>
          </>
        ) : (
          <span className={`tag ${isBlock ? 'tag-block' : 'tag-pass'}`}>
            {isBlock ? 'BLOCK' : '✓ PASS'}
          </span>
        )}
        {isBlock && evt.severity && <span className={`tag ${evt.severity === 'CRITICAL' ? 'tag-critical' : 'tag-high'}`}>{evt.severity}</span>}
        <span className="vrf-title">L{evt.layer} · {evt.type}</span>
        <span className="vrf-lat">{evt._lat}ms</span>
        <span className={`vrf-arrow ${open ? 'open' : ''}`}>▶</span>
      </div>
      {open && (
        <div className="vrf-detail fade-in">
          <div className="ai-wrap">
            <div className="ai-lbl">AI Output {isBlock && '· blocked before delivery'}{evt.flagOverride && '· flagged for review'}</div>
            <div className={`ai-body ${isBlock ? 'blocked' : ''}`}>{evt.ai}</div>
          </div>
          <div className="lens-list">
            <div className="ai-lbl">Verification Lenses</div>
            {evt.lenses.map((l,i) => <LensRow key={i} lens={l} />)}
          </div>
          <div className="rule-row">
            <div className="rule-chip-primary"><code>{evt.rule}</code></div>
            <div className="rule-chip">Policy: <span className="s">v2.1.0</span></div>
            <div className="rule-chip">Source: <span className="s">{evt.source}</span></div>
          </div>
          {evt.flagOverride && evt.overrideReason && (
            <div className="override-box">
              <div className="ai-lbl"><span style={{color:'var(--safe)',fontWeight:600}}>✓</span> Human reviewer override</div>
              <div className="override-text">{evt.overrideReason}</div>
            </div>
          )}
          {evt.insight && <div className="insight">{evt.insight}</div>}
          {isBlock && evt.replacement && (
            <div className="ai-wrap" style={{marginTop:'.35rem'}}>
              <div className="ai-lbl"><span style={{color:'var(--safe)',fontWeight:600}}>✓</span> Verified replacement delivered to patient</div>
              <div className="ai-body safe">{evt.replacement}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ APP ═══ */
function App() {
  const [rIdx, setRIdx] = useState(0);
  const [phase, setPhase] = useState('idle');
  const [visible, setVisible] = useState([]);  /* array of events with _time and _lat baked in */
  const [auditLog, setAuditLog] = useState([]);
  const [stats, setStats] = useState({checked:0,passed:0,blocked:0});
  const [journeyStep, setJourneyStep] = useState(0);
  const [currentReport, setCurrentReport] = useState(null); /* track which report audit entries belong to */
  const runRef = useRef(false);

  const report = REPORTS[rIdx];

  const addAudit = useCallback((layer, verdict, desc, rule, reportName, original, replacement) => {
    setAuditLog(p => [{ id:Date.now()+Math.random(), time:TS(), layer, verdict, desc, rule, reportName, original: original || null, replacement: replacement || null }, ...p]);
    setStats(p => ({ checked:p.checked+1, passed:verdict==='pass'?p.passed+1:p.passed, blocked:verdict==='block'?p.blocked+1:p.blocked }));
  }, []);

  const switchReport = useCallback((idx) => {
    setRIdx(idx); setPhase('idle'); setVisible([]);
    setJourneyStep(0); runRef.current = false;
  }, []);

  const reset = useCallback(() => {
    setPhase('idle'); setVisible([]); setJourneyStep(0);
    runRef.current = false;
  }, []);

  /* Fix #6: Use window.scrollTo for auto-scroll */
  const scrollToBottom = useCallback(() => {
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' }), 80);
  }, []);

  const run = useCallback(async () => {
    setPhase('running');
    runRef.current = true;
    setVisible([]);
    setJourneyStep(1); // Report ready
    setCurrentReport(REPORTS[rIdx].name);

    const evts = REPORTS[rIdx].events;
    for (let i = 0; i < evts.length; i++) {
      if (!runRef.current) return;
      const e = evts[i];

      // Journey: 1=report, 2=AI summarizing, 3=summary verified, 4=patient asks, 5=response verified
      if (e.layer === 1) setJourneyStep(2); // AI is generating summary
      if (e.type === 'patient') setJourneyStep(4); // Patient is asking
      if (e.layer === 2 && e.type !== 'patient') setJourneyStep(5); // Verifying response

      /* Fix #4: Generate timestamp and latency sequentially in the loop */
      const stampedEvent = { ...e, _time: TS(), _lat: LAT() };

      /* Show processing state */
      setPhase(e.type === 'patient' ? 'patient-arriving' : 'verifying');
      await sleep(e.type === 'patient' ? 500 : 700 + Math.random() * 400);
      if (!runRef.current) return;

      /* Reveal */
      setVisible(prev => [...prev, stampedEvent]);
      scrollToBottom();

      if (e.type !== 'patient') {
        const isBlock = e.verdict === 'BLOCK';
        const failLens = e.lenses.find(l => !l.pass);
        // After L1 verification, advance to "Summary verified"
        if (e.layer === 1) setJourneyStep(3);
        addAudit(
          `L${e.layer}`,
          isBlock ? 'block' : 'pass',
          isBlock ? truncate(failLens?.msg, 80)
            : e.flagOverride ? 'Flagged → reviewer override → delivered'
            : `Response verified safe across all lenses`,
          e.rule || '—',
          REPORTS[rIdx].name,
          isBlock ? e.ai : null,
          isBlock ? e.replacement : null
        );
      }

      setPhase('running');
      await sleep(e.type === 'patient' ? 600 : 1600);
    }

    if (!runRef.current) return;
    setJourneyStep(5);
    setPhase('done');
    runRef.current = false;
  }, [rIdx, addAudit, scrollToBottom]);

  /* ─── Journey config ─── */
  const jSteps = [
    { n:'1', label:'Report ready' },
    { n:'2', label:'AI summarizes' },
    { n:'3', label:'Summary verified' },
    { n:'4', label:'Patient asks' },
    { n:'5', label:'Response verified' },
    { n:'✓', label:'Delivered' },
  ];
  const jClass = (i) => {
    if (journeyStep === 0) return '';
    if (i < journeyStep) return 'done';
    if (i === journeyStep) return 'active';
    return '';
  };

  /* Fix #8: Split visible events into L1 and L2 groups */
  const l1Events = visible.filter(e => e.layer === 1);
  const l2Events = visible.filter(e => e.layer === 2);

  /* Fix #5: Group audit entries by report */
  const auditGroups = [];
  let lastReport = null;
  auditLog.forEach(e => {
    if (e.reportName !== lastReport) {
      auditGroups.push({ type:'header', name:e.reportName });
      lastReport = e.reportName;
    }
    auditGroups.push({ type:'entry', ...e });
  });

  const isProcessing = phase === 'verifying' || phase === 'patient-arriving';

  return (
    <>
      {/* Chrome */}
      <div className="chrome">
        <div className="chrome-logo">
          <div className="chrome-mark"><i></i><i></i><i></i><i></i></div>
          INTERLOCK
        </div>
        <div className="chrome-right">
          <span><span className={`chrome-dot ${isProcessing ? 'chrome-dot-y' : 'chrome-dot-g'}`}></span>{isProcessing ? 'Verifying' : 'Ready'}</span>
          <span>v0.4.1</span>
        </div>
      </div>

      <div className="shell">
        {/* Fix #6: Architecture bar always visible, right under chrome */}
        <div className="info-bar">
          <div className="info-item"><div className="info-dot" style={{background:'var(--behavioral)'}}></div><span><strong>3 verification lenses</strong> — clinical · behavioral · cultural</span></div>
          <div className="info-item"><div className="info-dot" style={{background:'var(--ink)'}}></div><span><strong>Independent</strong> — outside the model, no conflicts of interest</span></div>
        </div>

        {/* Journey */}
        <div className="journey">
          {jSteps.map((s,i) => (
            <React.Fragment key={i}>
              {i > 0 && <span className="j-arrow">→</span>}
              <div className={`j-step ${jClass(i)}`}>
                <div className="j-icon">{s.n}</div>
                {s.label}
              </div>
            </React.Fragment>
          ))}
        </div>

        {/* Grid */}
        <div className="grid">
          {/* Left */}
          <div>
            <div className="rpt-card">
              <div className="rpt-tabs">
                {REPORTS.map((r,i) => (
                  <div key={r.id} className={`rpt-tab ${rIdx===i?'active':''}`} onClick={() => switchReport(i)}>{r.name}</div>
                ))}
              </div>
              <div className="rpt-head">
                <div>
                  <span style={{fontWeight:600}}>{report.type}</span>
                  <span style={{marginLeft:'.4rem',fontFamily:'var(--mono)',fontSize:'var(--fs-xs)',color:'var(--muted-2)'}}>
                    {report.pt.id} · {report.pt.age} · {report.pt.collected}
                  </span>
                </div>
                <span style={{fontFamily:'var(--mono)',fontSize:'var(--fs-xs)',color:'var(--muted-2)'}}>{report.specimen}</span>
              </div>
              <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
              <table className="rpt-table">
                <thead><tr><th>Test</th><th>Result</th><th>Reference</th><th style={{width:44}}>Flag</th></tr></thead>
                <tbody>
                  {report.rows.map((r,i) => (
                    <tr key={i}>
                      <td style={{fontWeight:500}}>{r.t}</td>
                      <td className={r.f?'rpt-val-flag':''}>{r.v}</td>
                      <td className="rpt-ref">{r.r}</td>
                      <td>{r.f && <span className="tag tag-flag">{r.f}</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>

              {/* ═══ LAYER 1: AI Summary — renders INSIDE the report card ═══ */}
              {l1Events.length > 0 && l1Events.map((evt, i) => {
                const isBlock = evt.verdict === 'BLOCK';
                return (
                  <div key={`l1-${i}`} className="summary-section slide-up">
                    <div className="summary-header">
                      <span className="tag tag-l1">Layer 1</span>
                      <span className="label">AI Patient Summary</span>
                      <span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:10,color:'var(--muted-3)'}}>{evt._time} · {evt._lat}ms</span>
                    </div>

                    {/* The AI-generated summary */}
                    <div className={`summary-ai ${isBlock ? 'blocked' : ''}`}>
                      {evt.ai}
                    </div>

                    {/* Verification result */}
                    <div className={`summary-verdict ${isBlock ? 'is-block' : ''} slide-up`}>
                      <div style={{display:'flex',alignItems:'center',gap:'.35rem',marginBottom:'.35rem'}}>
                        <span className={`tag ${isBlock ? 'tag-block' : 'tag-pass'}`}>
                          {isBlock ? 'BLOCK' : '✓ PASS'}
                        </span>
                        {isBlock && evt.severity && <span className={`tag ${evt.severity === 'CRITICAL' ? 'tag-critical' : 'tag-high'}`}>{evt.severity}</span>}
                      </div>
                      <div className="lens-list">
                        {evt.lenses.map((l,j) => <LensRow key={j} lens={l} />)}
                      </div>
                      <div className="rule-row">
                        <div className="rule-chip-primary"><code>{evt.rule}</code></div>
                        <div className="rule-chip">Policy: <span className="s">v2.1.0</span></div>
                        <div className="rule-chip">Source: <span className="s">{evt.source}</span></div>
                      </div>
                      {evt.insight && <div className="insight">{evt.insight}</div>}
                    </div>

                    {/* Corrected summary */}
                    {isBlock && evt.replacement && (
                      <div className="summary-corrected slide-up">
                        <div className="summary-corrected-label">✓ Verified summary delivered to patient</div>
                        <div className="summary-ai safe">{evt.replacement}</div>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Processing indicator for L1 */}
              {phase === 'verifying' && visible.length === 0 && (
                <div className="summary-section">
                  <div style={{display:'flex',alignItems:'center',gap:'.5rem',padding:'.2rem 0'}}>
                    <span className="spinner"></span>
                    <span style={{fontFamily:'var(--mono)',fontSize:'var(--fs-xs)',color:'var(--cultural)'}}>
                      Generating patient summary… verifying against clinical, behavioral, cultural lenses…
                    </span>
                  </div>
                </div>
              )}

              <div className="action-bar">
                {phase === 'idle' && <button onClick={run} className="btn btn-primary">▶ Run Verification</button>}
                {(phase === 'running' || isProcessing) && (
                  <button onClick={() => {runRef.current=false; setPhase('done');}} className="btn btn-ghost">⏸ Stop</button>
                )}
                {phase === 'done' && (
                  <>
                    <button onClick={reset} className="btn btn-ghost">↻ Reset</button>
                    {rIdx < REPORTS.length - 1 && <button onClick={() => switchReport(rIdx+1)} className="btn btn-primary">Next Report →</button>}
                  </>
                )}
                {isProcessing && l1Events.length === 0 && (
                  <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'.4rem'}}>
                    <span className="spinner"></span>
                    <span style={{fontFamily:'var(--mono)',fontSize:'var(--fs-xs)',color:'var(--cultural)'}}>
                      Generating summary…
                    </span>
                  </span>
                )}
              </div>
            </div>

            {/* Empty state hint — before anything runs */}
            {visible.length === 0 && phase === 'idle' && (
              <div className="empty-hint">
                <div style={{fontFamily:'var(--mono)',fontSize:10,marginBottom:'.15rem'}}>VERIFICATION PIPELINE</div>
                Layer 1 verifies the AI patient summary · Layer 2 verifies AI responses to patient questions
              </div>
            )}

            {/* ═══ PHASE DIVIDER — between L1 and L2 ═══ */}
            {l1Events.length > 0 && (l2Events.length > 0 || phase === 'patient-arriving') && (
              <div className="phase-divider slide-up">
                <div className="phase-divider-icon" style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600,color:'var(--behavioral)'}}>L2</div>
                <div className="phase-divider-text">
                  <strong>Patient reads summary and has questions</strong>
                  <span>Layer 2 verifies every AI response to patient questions</span>
                </div>
              </div>
            )}

            {/* ═══ LAYER 2: Patient Conversation ═══ */}
            {l2Events.length > 0 && (
              <div className="convo-section">
                {l2Events.map((evt,i) => {
                  if (evt.type === 'patient') {
                    return (
                      <div key={`l2-${i}`} className="convo-turn slide-up">
                        <div className="convo-patient-label">Patient</div>
                        <div className="convo-patient">{evt.text}</div>
                      </div>
                    );
                  }
                  return <VBlock key={`l2-${i}`} evt={evt} isLast={i === l2Events.length - 1} />;
                })}
              </div>
            )}

            {/* Processing indicator for L2 */}
            {isProcessing && l1Events.length > 0 && (
              <div className="processing-bar" style={{marginTop:'.5rem'}}>
                <span className="spinner"></span>
                {phase === 'patient-arriving'
                  ? 'Patient submitting follow-up question…'
                  : 'Checking clinical, behavioral, cultural lenses…'
                }
              </div>
            )}
          </div>

          {/* Right: Audit */}
          <div className="audit-panel">
            <div className="audit-head">
              <span className="label" style={{margin:0}}>Audit Trail</span>
              <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted-3)'}}>{auditLog.length}</span>
            </div>
            <div className="audit-stats">
              <div className="audit-stat">
                <div className="audit-stat-num">{stats.checked}</div>
                <div className="audit-stat-label">Checked</div>
              </div>
              <div className="audit-stat">
                <div className="audit-stat-num" style={{color:'var(--safe)'}}>{stats.passed}</div>
                <div className="audit-stat-label">Passed</div>
              </div>
              <div className="audit-stat">
                <div className="audit-stat-num" style={{color:'var(--danger)'}}>{stats.blocked}</div>
                <div className="audit-stat-label">Blocked</div>
              </div>
            </div>

            {auditLog.length === 0 ? (
              /* Fix #18: Ghost skeleton for empty audit */
              <div className="audit-ghost">
                {[0,1,2].map(i => (
                  <div key={i} className="audit-ghost-row" style={{opacity: .7 - i * .2}}>
                    <div><div className="ghost-bar" style={{width:'80%',marginBottom:3}}></div><div className="ghost-bar" style={{width:'50%'}}></div></div>
                    <div className="ghost-bar" style={{width:42,height:18,borderRadius:3}}></div>
                  </div>
                ))}
                <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted-3)',marginTop:'.5rem'}}>
                  Events populate during verification
                </div>
              </div>
            ) : (
              <div className="audit-list">
                {/* Fix #5: Grouped by report */}
                {auditGroups.map((item, i) => {
                  if (item.type === 'header') {
                    return <div key={`h-${i}`} className="audit-group-head">{item.name}</div>;
                  }
                  const isPass = item.verdict === 'pass';
                  return <AuditRow key={item.id} item={item} isPass={isPass} demoComplete={phase === 'done'} />;
                })}
              </div>
            )}

            <div className="audit-footer">
              Immutable · Timestamped · Exportable<br/>
              Compliance, legal, insurance documentation<br/>
              <span style={{color:'var(--safe)'}}>0 unverified responses reached patient</span>
            </div>
          </div>
        </div>
      </div>

      {/* Bottom breathing room */}
      <div style={{height:'2rem'}}></div>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
